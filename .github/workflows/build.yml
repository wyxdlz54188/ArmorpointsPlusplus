name: Build ArmorPointsPP

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Remove local java.home from gradle.properties
        run: sed -i '/org.gradle.java.home/d' gradle.properties

      - name: Build with Gradle
        run: ./gradlew :fabric-1.26.1:build --no-daemon

      - name: Upload fabric-1.26.1 artifact
        uses: actions/upload-artifact@v4
        with:
          name: armorpointspp-fabric-26.1
          path: fabric-1.26.1/build/libs/*.jar
          if-no-files-found: error
